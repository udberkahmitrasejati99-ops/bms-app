<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS HUB</title>
    <style>
        body { font-family: sans-serif; background: #0b1120; color: #fff; padding: 20px; margin: 0; }
        h2 { text-align: center; color: #f97316; margin-bottom: 25px; }
        
        .accordion { background: #1e293b; color: #fff; cursor: pointer; padding: 18px; width: 100%; text-align: left; border: none; border-radius: 8px; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .panel { padding: 0 10px; display: none; background-color: #0f172a; overflow: hidden; border-radius: 0 0 8px 8px; margin-bottom: 10px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; text-align: center; text-decoration: none; font-weight: bold; }
        
        #frame-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
        #menu-utama-btn { position: fixed; bottom: 20px; right: 20px; background: #f97316; color: white; border: none; padding: 15px 20px; border-radius: 50px; font-weight: bold; z-index: 10000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h2>BMS HUB</h2>

    <button class="accordion">OPERASIONAL BMS ▾</button>
    <div class="panel">
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbwB5esfTC0xyKaGpAtaPev7Ym-YNghFnkFug-TrbGS6WYalDM9mULYUDwrlcFr_20onQQ/exec')">DELIVERY BMS</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbxnmcOSEeTUg_4pt4Ada5e_VQQAhaMw5IS8SYm_2-XreX4jCK2TajFQX4nLlKRpWUHijw/exec')">PICKUP BMS</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbwrfuzxw7bKtWK-Op440YAdUpmzfErr6edrMqleMsyrHjX__kiQTiG1QqeiOFeMUdNj/exec')">BIAYA KENDARAAN</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbx9P6T3omMQIHKO45S56oUyui5peKcUgrkLZLysmEATzSr-OwNXryME_wWBs_c4sTybPw/exec')">ETOLL & KAS</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbx43YgXrhSVE6b2J1Mr2_A4yGlrSGp8TEW06od3ux7wbaauH7se4smHB1elPViAiThxRQ/exec')">TOTAL BIAYA OPR</a>
    </div>

    <button class="accordion">PENJUALAN & PENGELUARAN ▾</button>
    <div class="panel">
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbxnBMIrWlfaNwq8wJkIlP3WWGrdE50Qqz2l1ux5BZiDj5leQd36j37JlzqtWjjZiswy2A/exec')">DASHBOARD PENJUALAN</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbwiyezqYuEQG0xKttMRkx82QvuHGgTaIl_mHgfrKfBz-1zCMqH87tXRkcmp3jFaEExhnw/exec')">DASHBOARD PENGELUARAN</a>
    </div>

    <button class="accordion">PENGELUARAN HARIAN ▾</button>
    <div class="panel"><p style="padding:10px; font-size:12px;">Data akan segera diintegrasikan.</p></div>
    <button class="accordion">MIKROTRANS ▾</button>
    <div class="panel"><p style="padding:10px; font-size:12px;">Data akan segera diintegrasikan.</p></div>
    <button class="accordion">PROYEK ▾</button>
    <div class="panel"><p style="padding:10px; font-size:12px;">Data akan segera diintegrasikan.</p></div>

    <div id="frame-container">
        <button id="menu-utama-btn" onclick="closeFrame()">MENU UTAMA</button>
        <iframe id="main-frame"></iframe>
    </div>

    <script>
        var acc = document.getElementsByClassName("accordion");
        for (var i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                this.classList.toggle("active");
                var panel = this.nextElementSibling;
                panel.style.display = panel.style.display === "block" ? "none" : "block";
            });
        }
        function openFrame(url) {
            document.getElementById('main-frame').src = url;
            document.getElementById('frame-container').style.display = 'block';
        }
        function closeFrame() {
            document.getElementById('frame-container').style.display = 'none';
            document.getElementById('main-frame').src = '';
        }
    </script>
</body>
</html>
