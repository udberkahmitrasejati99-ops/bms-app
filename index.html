<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS HUB</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1120; color: #fff; padding: 20px; margin: 0; }
        h2 { text-align: center; color: #f97316; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #f97316; }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; color: #e2e8f0; }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: #334155; color: white; text-align: center; text-decoration: none; font-weight: bold; }
        .btn:hover { background: #475569; }
        #frame-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #close-btn { position: fixed; top: 10px; right: 10px; z-index: 1000; background: red; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>BMS HUB</h2>

    <div class="card">
        <h3>OPERASIONAL BMS</h3>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbwB5esfTC0xyKaGpAtaPev7Ym-YNghFnkFug-TrbGS6WYalDM9mULYUDwrlcFr_20onQQ/exec')">DELIVERY BMS</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbxnmcOSEeTUg_4pt4Ada5e_VQQAhaMw5IS8SYm_2-XreX4jCK2TajFQX4nLlKRpWUHijw/exec')">PICKUP BMS</a>
    </div>

    <div class="card">
        <h3>PENJUALAN & PENGELUARAN</h3>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbxnBMIrWlfaNwq8wJkIlP3WWGrdE50Qqz2l1ux5BZiDj5leQd36j37JlzqtWjjZiswy2A/exec')">DASHBOARD PENJUALAN</a>
        <a class="btn" href="#" onclick="openFrame('https://script.google.com/macros/s/AKfycbwiyezqYuEQG0xKttMRkx82QvuHGgTaIl_mHgfrKfBz-1zCMqH87tXRkcmp3jFaEExhnw/exec')">DASHBOARD PENGELUARAN</a>
    </div>

    <div id="frame-container">
        <div id="close-btn" onclick="closeFrame()">TUTUP</div>
        <iframe id="main-frame"></iframe>
    </div>

    <script>
        function openFrame(url) {
            document.getElementById('main-frame').src = url;
            document.getElementById('frame-container').style.display = 'block';
        }
        function closeFrame() {
            document.getElementById('frame-container').style.display = 'none';
            document.getElementById('main-frame').src = '';
        }
    </script>
</body>
</html>
